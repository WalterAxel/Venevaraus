<div class="calendar-widget" id="calendar-widget" aria-label="Kalenteri">
  <div class="calendar-widget__header">
    <button type="button" class="calendar-widget__nav" id="cal-prev" aria-label="Edellinen kuukausi">‹</button>
    <h2 class="calendar-widget__title" id="cal-title">Kalenteri</h2>
    <button type="button" class="calendar-widget__nav" id="cal-next" aria-label="Seuraava kuukausi">›</button>
  </div>
  <div class="calendar-widget__weekdays" role="row">
    <span>Ma</span><span>Ti</span><span>Ke</span><span>To</span><span>Pe</span><span>La</span><span>Su</span>
  </div>
  <div class="calendar-widget__grid" id="cal-grid" role="grid"></div>
</div>

<style>
  .calendar-widget {
    --cal-border: #c5ccd6;
    --cal-bg: #f8f9fb;
    --cal-header-bg: #e8ecf2;
    --cal-today: #1a5fb4;
    --cal-booked: #2d7a4d;
    max-width: 28rem;
    margin: 1.25rem 0;
    border: 1px solid var(--cal-border);
    border-radius: 8px;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    font-size: 0.9rem;
  }

  .calendar-widget__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    padding: 0.6rem 0.5rem;
    background: var(--cal-header-bg);
    border-bottom: 1px solid var(--cal-border);
  }

  .calendar-widget__title {
    margin: 0;
    font-size: 1rem;
    font-weight: 600;
    flex: 1;
    text-align: center;
  }

  .calendar-widget__nav {
    width: 2rem;
    height: 2rem;
    border: 1px solid var(--cal-border);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
  }

  .calendar-widget__nav:hover {
    background: #eef1f6;
  }

  .calendar-widget__weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: #555;
    padding: 0.35rem 0.25rem 0.15rem;
    background: var(--cal-bg);
    border-bottom: 1px solid var(--cal-border);
  }

  .calendar-widget__grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    background: var(--cal-border);
  }

  .calendar-widget__cell {
    min-height: 2.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    font-size: 0.85rem;
  }

  .calendar-widget__cell--empty {
    background: var(--cal-bg);
  }

  .calendar-widget__cell--booked {
    background: rgba(45, 122, 77, 0.1);
  }

  .calendar-widget__day {
    width: 100%;
    height: 100%;
    min-height: 2.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    cursor: default;
    font: inherit;
  }

  .calendar-widget__day--pick {
    cursor: pointer;
  }

  .calendar-widget__day--pick:hover {
    background: rgba(26, 95, 180, 0.08);
    border-radius: 6px;
  }

  .calendar-widget__day--today {
    background: rgba(26, 95, 180, 0.12);
    color: var(--cal-today);
    font-weight: 700;
    border-radius: 6px;
  }

  .calendar-widget__cell--booked .calendar-widget__day--today {
    box-shadow: inset 0 0 0 2px var(--cal-today);
  }

  .calendar-widget__day--booked:not(.calendar-widget__day--today) {
    color: var(--cal-booked);
    font-weight: 600;
  }

  .calendar-widget__day--inspect {
    cursor: pointer;
  }

  .calendar-widget__day--inspect:hover {
    text-decoration: underline;
  }
</style>

<script>
  (function () {
    var monthNames = [
      "Tammikuu", "Helmikuu", "Maaliskuu", "Huhtikuu", "Toukokuu", "Kesäkuu",
      "Heinäkuu", "Elokuu", "Syyskuu", "Lokakuu", "Marraskuu", "Joulukuu"
    ];

    var reservations = {{ reservations | default([]) | tojson }};
    var pickDates = {{ calendar_pick_dates | default(false) | tojson }};

    var grid = document.getElementById("cal-grid");
    var titleEl = document.getElementById("cal-title");
    var now = new Date();
    var y = now.getFullYear();
    var m = now.getMonth();

    function mondayFirstOffset(date) {
      return (date.getDay() + 6) % 7;
    }

    function pad2(n) {
      return n < 10 ? "0" + n : String(n);
    }

    function isoDate(y, mo, d) {
      return y + "-" + pad2(mo + 1) + "-" + pad2(d);
    }

    function datePart(isoStr) {
      if (!isoStr) return "";
      return isoStr.slice(0, 10);
    }

    function reservationsForDay(y, mo, d) {
      var dayStr = isoDate(y, mo, d);
      return reservations.filter(function (r) {
        var s = datePart(r.start);
        var e = datePart(r.end);
        return dayStr >= s && dayStr <= e;
      });
    }

    function bookingTitle(r) {
      return r.title + " (" + r.username + ")";
    }

    function render() {
      titleEl.textContent = monthNames[m] + " " + y;
      grid.innerHTML = "";

      var first = new Date(y, m, 1);
      var startPad = mondayFirstOffset(first);
      var daysInMonth = new Date(y, m + 1, 0).getDate();

      for (var i = 0; i < startPad; i++) {
        var empty = document.createElement("div");
        empty.className = "calendar-widget__cell calendar-widget__cell--empty";
        empty.setAttribute("role", "gridcell");
        grid.appendChild(empty);
      }

      var today = new Date();
      var isThisMonth = today.getFullYear() === y && today.getMonth() === m;

      for (var d = 1; d <= daysInMonth; d++) {
        var cell = document.createElement("div");
        cell.className = "calendar-widget__cell";
        cell.setAttribute("role", "gridcell");

        var dayRes = reservationsForDay(y, m, d);
        if (dayRes.length) {
          cell.classList.add("calendar-widget__cell--booked");
        }

        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "calendar-widget__day";
        btn.textContent = String(d);
        btn.setAttribute("tabindex", "-1");

        if (dayRes.length) {
          btn.classList.add("calendar-widget__day--booked");
          btn.classList.add("calendar-widget__day--inspect");
          btn.title = dayRes.map(bookingTitle).join("\n");
        }

        if (isThisMonth && d === today.getDate()) {
          btn.classList.add("calendar-widget__day--today");
        }

        if (pickDates && !dayRes.length) {
          btn.classList.add("calendar-widget__day--pick");
        }

        btn.addEventListener("click", function (yy, mm, dd) {
          return function () {
            var dr = reservationsForDay(yy, mm, dd);
            if (dr.length === 1) {
              window.location.href = "/reservation/" + dr[0].id;
              return;
            }
            if (dr.length > 1) {
              window.location.href = "/reservations/day/" + isoDate(yy, mm, dd);
              return;
            }
            if (pickDates) {
              var startEl = document.getElementById("start");
              var endEl = document.getElementById("end");
              if (!startEl || !endEl) return;
              var datePartStr = isoDate(yy, mm, dd);
              startEl.value = datePartStr + "T09:00";
              endEl.value = datePartStr + "T17:00";
            }
          };
        }(y, m, d));

        cell.appendChild(btn);
        grid.appendChild(cell);
      }
    }

    document.getElementById("cal-prev").addEventListener("click", function () {
      m--;
      if (m < 0) {
        m = 11;
        y--;
      }
      render();
    });

    document.getElementById("cal-next").addEventListener("click", function () {
      m++;
      if (m > 11) {
        m = 0;
        y++;
      }
      render();
    });

    render();
  })();
</script>
