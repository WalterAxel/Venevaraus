<!DOCTYPE html>
<html>

<head>
  <title>Uusi ilmoitus</title>
</head>

<body>
  <p><a href="/">← Etusivu</a></p>

  <h1>Uusi ilmoitus</h1>

  {% set calendar_pick_dates = true %}
  {% include 'calendar.html' %}

  <form action="/create_reservation" method="post">
    {% include '_csrf_field.html' %}
    <p>
      Tyyppi: <br />
      <label><input type="radio" name="category" value="varaus" checked /> Varaus</label>
      <label><input type="radio" name="category" value="vikailmoitus" /> Vikailmoitus</label>
    </p>
    <p>
      Otsikko: <br />
      <input type="text" name="title" />
    </p>
    <p>
      Kuvaus: <br />
	  <textarea name="description" rows="8" cols="60"></textarea>
    </p>
	<p>
	  Aloitus päivä: <br />
	  <input type="datetime-local" id="start" name="reservation_start" />
	</p>
    <p>
	  Lopetus päivä: <br />
	  <input type="datetime-local" id="end" name="reservation_end" />
	</p>

    <input type="submit" value="Tallenna ilmoitus" />
  </form>
</body>

</html>
